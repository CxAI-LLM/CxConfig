name: CI

on:
  push:
    branches: [main, dev/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint
        run: find src/ -name '*.php' | xargs -I{} php -l {} | grep -v "No syntax errors" || true

  deploy:
    runs-on: self-hosted
    needs: [test]
    if: gitea.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Deploying CxConfig..."
          echo "CxConfig deployed"
