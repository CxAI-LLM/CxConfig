version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - php
    commit-message:
      prefix: "deps"
